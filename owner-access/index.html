<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Доступ владельца — Track Start</title><link rel="stylesheet" href="../styles.css"><style>body{min-height:100vh;display:grid;place-items:center;background:var(--bg)}.owner-card{width:min(440px,calc(100% - 32px));padding:32px;border:1px solid var(--border);border-radius:24px;background:var(--card)}.owner-card h1{margin:0 0 12px;font-size:32px}.owner-card p{color:var(--muted);line-height:1.6}.owner-card label{display:grid;gap:8px;margin:24px 0 16px}.owner-card .input{width:100%}.owner-card .btn{width:100%;justify-content:center}.owner-status{margin-top:16px}.owner-links{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px}.owner-links a{text-align:center}@media(max-width:480px){.owner-links{grid-template-columns:1fr}}</style></head><body><main class="owner-card"><div class="eyebrow"><span class="dot"></span>Track Start</div><h1>Доступ владельца</h1><p id="owner-copy">Введите личный пароль. Доступ сохранится в этом браузере на 30 дней.</p><form id="owner-form"><label><span>Пароль</span><input class="input" id="owner-password" type="password" autocomplete="current-password" required></label><button class="btn btn-primary" type="submit">Войти как владелец</button></form><button class="btn btn-secondary" id="owner-logout" type="button" hidden>Выйти из режима владельца</button><p class="owner-status" id="owner-status" aria-live="polite"></p><div class="owner-links"><a class="btn btn-secondary" href="../generator.html">Генератор</a><a class="btn btn-secondary" href="../vocal.html">Исполнение</a><a class="btn btn-secondary" href="../promotion.html">Продвижение</a><a class="btn btn-secondary" href="../ru/academy/library/voice-in-suno/">Полная книга</a></div></main><script src="../owner-access.js"></script></body></html>
